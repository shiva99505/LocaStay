# LocaStay Supabase project config.
# Full reference: https://supabase.com/docs/reference/cli/config

[project]
id = "locastay"          # Replace with your actual project ref

[api]
enabled        = true
port           = 54321
schemas        = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows       = 1000

[db]
port     = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port    = 54323

[inbucket]
enabled = true       # local email testing
port    = 54324

[storage]
enabled = true

[auth]
enabled            = true
site_url           = "http://localhost:3000"
additional_redirect_urls = ["https://locastay.in"]
jwt_expiry         = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup      = true
minimum_password_length = 8

[auth.email]
enable_signup          = true
double_confirm_changes = true
enable_confirmations   = false   # set true in production

[edge_runtime]
enabled = true
policy  = "oneshot"

[functions.booking-notification]
verify_jwt = false    # authenticated by WEBHOOK_SECRET header instead

[functions.rent-reminder]
verify_jwt = false    # authenticated by CRON_SECRET header instead
